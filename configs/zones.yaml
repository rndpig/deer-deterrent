# Camera-to-Irrigation Zone Mapping Configuration
# Last Updated: 2026-03-28
#
# Ring Camera IDs:
#   Woods:      10cea9e4511f  (formerly Side, moved to barn — Floodlight Cam)
#   Side:       c4dbad08f862  (new Floodlight Cam Pro 2nd Gen)
#   Driveway:   587a624d3fae
#   Front Door: 4439c4de7a79
#   Back:       f045dae9383a
#
# Rainbird Zone Names (from ESP-Me controller):
#   1: Driveway North    5: Woods North      9: Front Sidewalk    13: House South 2
#   2: Garage North      6: Woods South      10: Driveway South   14: Garage South
#   3: Patio Lawn        7: House South 1    11: Road South
#   4: Patio N Bed       8: Front Beds       12: Patio S Bed
#
# NOTE: Camera-to-zone mapping is managed via the Settings page (PUT /api/settings → camera_zones).
# The coordinator syncs this mapping every 30 seconds. This file is reference only.

zones:
  - name: "Woods"
    camera_id: "10cea9e4511f"
    detection_area:
      x_min: 0.0
      y_min: 0.0
      x_max: 1.0
      y_max: 1.0
    irrigation_zones: [5, 6]

  - name: "Side Yard"
    camera_id: "c4dbad08f862"
    detection_area:
      x_min: 0.0
      y_min: 0.0
      x_max: 1.0
      y_max: 1.0
    irrigation_zones: [5, 6]

  - name: "Driveway"
    camera_id: "587a624d3fae"
    detection_area:
      x_min: 0.0
      y_min: 0.0
      x_max: 1.0
      y_max: 1.0
    irrigation_zones: [1, 10]

  - name: "Front Door - Beds & Sidewalk"
    camera_id: "4439c4de7a79"
    detection_area:
      x_min: 0.0
      y_min: 0.0
      x_max: 1.0
      y_max: 1.0
    irrigation_zones: [8, 9]

  - name: "Back Yard"
    camera_id: "f045dae9383a"
    detection_area:
      x_min: 0.0
      y_min: 0.0
      x_max: 1.0
      y_max: 1.0
    irrigation_zones: [3, 7, 13]

# Camera configuration
cameras:
  - id: "10cea9e4511f"
    name: "Woods"
    enabled: true

  - id: "c4dbad08f862"
    name: "Side"
    enabled: true

  - id: "587a624d3fae"
    name: "Driveway"
    enabled: true

  - id: "4439c4de7a79"
    name: "Front Door"
    enabled: false

  - id: "f045dae9383a"
    name: "Back"
    enabled: false

# Global settings
settings:
  min_confidence: 0.55
  zone_cooldown: 300
  irrigation_duration: 30
  active_hours:
    enabled: true
    start: 20
    end: 6
  dry_run: false
