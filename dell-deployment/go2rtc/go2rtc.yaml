# go2rtc relay config — relays Ring camera RTSP streams from ring-mqtt (port 8554)
# and exposes WebRTC/MSE API on port 1984 for the frontend dashboard.
#
# Ring cameras stream via ring-mqtt's internal go2rtc RTSP server (port 8554).
# Stream names match ring-mqtt's convention: {ring_camera_id}_live
#
# Cameras:
#   10cea9e4511f — Woods
#   c4dbad08f862 — Side (4K Floodlight Pro)
#   587a624d3fae — Driveway
#   4439c4de7a79 — Front Door
#   f045dae9383a — Back

api:
  listen: ':1984'

streams:
  10cea9e4511f_live: rtsp://deer-ring-mqtt:8554/10cea9e4511f_live
  c4dbad08f862_live: rtsp://deer-ring-mqtt:8554/c4dbad08f862_live
  587a624d3fae_live: rtsp://deer-ring-mqtt:8554/587a624d3fae_live
  4439c4de7a79_live: rtsp://deer-ring-mqtt:8554/4439c4de7a79_live
  f045dae9383a_live: rtsp://deer-ring-mqtt:8554/f045dae9383a_live
